spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:bookserver/.env[.properties]

  application:
    name: bookserver

  datasource:
    url: jdbc:h2:file:./data/bookdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Google OAuth와 OpenAI 설정은 bookserver/.env 값을 자동으로 읽습니다.
  # GOOGLE_CLIENT_ID/GOOGLE_CLIENT_SECRET이 있으면 Google OAuth가 활성화됩니다.
  # Google Console 승인된 리디렉션 URI: http://localhost:8080/login/oauth2/code/google

logging:
  level:
    org.hibernate.SQL: debug

server:
  port: 8080
