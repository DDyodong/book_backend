spring:
  application:
    name: bookserver

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Google OAuth는 application-oauth.yaml에 분리했습니다.
  # 실행 시 oauth 프로필과 GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET 환경변수를 설정하세요.
  # Google Console 승인된 리디렉션 URI: http://localhost:5173/login/oauth2/code/google

logging:
  level:
    org.hibernate.SQL: debug

server:
  port: 8080
