spring:
  application:
    name: bookserver

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Google OAuth 설정은 application-oauth.yaml에 분리되어 있습니다.
  # 실행 시 oauth 프로필을 활성화하면 bookserver/.env 값을 자동으로 읽습니다.
  # Google Console 승인된 리디렉션 URI: http://localhost:8080/login/oauth2/code/google

logging:
  level:
    org.hibernate.SQL: debug

server:
  port: 8080
